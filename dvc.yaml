stages:
  prepare:
    cmd: python src/prepare.py
    deps:
    - data/raw/iris.csv
    - src/prepare.py
    params:
    - prepare.random_state
    - prepare.test_size
    outs:
    - data/processed
  train:
    cmd: python src/train.py
    deps:
    - data/processed/test.csv
    - data/processed/train.csv
    - src/train.py
    params:
    - train.max_iter
    - train.model_type
    - train.random_state
    outs:
    - models/model.joblib
    metrics:
    - metrics/metrics.json:
        cache: false
